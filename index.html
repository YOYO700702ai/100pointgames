                                            <div className={`w-[100px] h-[100px] rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all relative ${player.equipped.weapon ? 'border-solid border-[#4361EE] bg-white border-[3px]' : 'border-3 border-dashed border-[#BCAAA4] bg-white/50 hover:bg-white hover:border-[#FF9F1C]'}`} onClick={() => unequipItem('weapon')} title={player.equipped.weapon ? "й»һж“Ҡи„«дёӢ" : "жӯҰеҷЁж¬„"}>
                                                <div className="absolute -top-3 bg-[#8D6E63] text-white px-2.5 py-0.5 rounded-full text-[0.7rem] font-bold">жӯҰеҷЁ</div>
                                                {player.equipped.weapon ? (<><div className="text-[2.2rem] mb-1 leading-none flex justify-center items-center w-12 h-12">{ITEMS[player.equipped.weapon].icon}</div><div className="text-[0.8rem] font-bold text-center w-full shrink-0 px-1">{ITEMS[player.equipped.weapon].name}</div></>) : <div className="text-3xl text-[#ccc]">вҡ”пёҸ</div>}
                                            </div>
                                            <div className={`w-[100px] h-[100px] rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all relative ${player.equipped.pet ? 'border-solid border-[#4361EE] bg-white border-[3px]' : 'border-3 border-dashed border-[#BCAAA4] bg-white/50 hover:bg-white hover:border-[#FF9F1C]'}`} onClick={() => unequipItem('pet')} title={player.equipped.pet ? "й»һж“Ҡи„«дёӢ" : "еҜөзү©ж¬„"}>
                                                <div className="absolute -top-3 bg-[#8D6E63] text-white px-2.5 py-0.5 rounded-full text-[0.7rem] font-bold">еҜөзү©</div>
                                                {player.equipped.pet ? (<><div className="text-[2.2rem] mb-1 leading-none flex justify-center items-center w-12 h-12">{ITEMS[player.equipped.pet].icon}</div><div className="text-[0.8rem] font-bold text-center w-full shrink-0 px-1">{ITEMS[player.equipped.pet].name}</div></>) : <div className="text-3xl text-[#ccc]">рҹҗҫ</div>}
                                            </div>
                                        </div>
                                    </div>
                                    <p className="text-xs text-[#666] mt-3 text-center">й»һж“ҠиғҢеҢ…зү©е“Ғз©ҝжҲҙ/дҪҝз”ЁпјҢй»һж“ҠеҸіеҒҙиЈқеӮҷи„«дёӢгҖӮ</p>
                                </div>
                            )}

                            {scene === 'shop' && (
                                <div className="absolute inset-0 bg-[#FFF8F0] p-4 flex flex-row gap-4">
                                    <div className="w-[240px] flex flex-col items-center bg-[#fdf5e6] rounded-2xl p-3 border-2 border-[#e0c097]">
                                        <div className="text-[6rem] mb-2 drop-shadow-[2px_4px_6px_rgba(0,0,0,0.2)]">{NPC_PROFILES[currentNpc].img}</div>
                                        <div className="bg-white border-[3px] border-[#333] rounded-xl p-3 w-full h-[150px] text-[0.95rem] text-[#333] relative shadow-[4px_4px_0_rgba(0,0,0,0.1)] overflow-y-auto custom-scroll mb-3 flex flex-col gap-2">
                                            <div className="absolute -top-2.5 left-1/2 -translate-x-1/2 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-b-[10px] border-b-[#333]"></div>
                                            {npcHistories[currentNpc].map((msg, idx) => (
                                                <div key={idx} className={`p-2 rounded-xl text-[0.9rem] leading-[1.4] max-w-[90%] border ${msg.role === 'user' ? 'bg-[#E3F2FD] rounded-br-sm self-end border-[#BBDEFB]' : 'bg-white rounded-bl-sm self-start border-[#eee]'}`}>
                                                    {msg.text.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>)}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col">
                                        <div className="flex justify-between items-center mb-3">
                                            <h2 className="m-0 text-2xl font-bold text-[#5D4037]">{currentNpc === 'merchant' ? 'рҹҸ•пёҸ жөҒжөӘе•Ҷдәә' : 'рҹҸӘ зҘһз§ҳе•Ҷеә—'}</h2>
                                            <button className="bg-[#4361EE] text-white px-4 py-2 rounded-lg font-bold shadow-[0_3px_0_#2841ac]" onClick={() => setScene('village')}>йӣўй–Ӣ</button>
                                        </div>
                                        <div className="grid grid-cols-[repeat(auto-fill,minmax(130px,1fr))] gap-3 overflow-y-auto custom-scroll pr-1">
                                            {(currentNpc === 'merchant' ? (['frag_north', 'frag_south', 'frag_east', 'frag_west', 'frag_outer'].filter(id => hasItem(id)).length === 5 ? ['key_strange'] : []) : SHOP_ITEMS).map(itemId => {
                                                const item = ITEMS[itemId]; const isHidden = itemId === 'key_strange';
                                                return (
                                                    <div key={itemId} className={`bg-white border-2 rounded-xl p-2 flex flex-col items-center text-center w-full min-h-[120px] ${isHidden ? 'border-[#FFD700] bg-[#FFFDE7] [animation:glow_2s_infinite_alternate]' : 'border-[#E0D0C0]'}`}>
                                                        <div className="w-12 h-12 text-[2.2rem] flex justify-center items-center leading-none mb-1">{item.icon.startsWith('<') ? <div dangerouslySetInnerHTML={{__html: item.icon}} className="max-w-full max-h-full flex justify-center items-center" /> : item.icon}</div>
                                                        <div className="text-[0.8rem] font-bold shrink-0 w-full mb-1">{item.name}</div>
                                                        <div className="bg-[#FF9F1C] text-white rounded-full px-2 py-0.5 text-[0.8rem] my-1.5 font-bold">рҹ’° {itemId === 'key_strange' ? '1000 + 5зўҺзүҮ' : item.price}</div>
                                                        <p className="text-[0.7rem] text-[#666] m-0 mb-2">{item.desc}</p>
                                                        <button className="mt-auto bg-[#4361EE] text-white text-sm font-bold px-4 py-1.5 rounded-lg shadow-[0_2px_0_#2841ac] active:translate-y-0.5 active:shadow-none" onClick={() => buyItem(itemId)}>иіјиІ·</button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {damageFloats.map(df => (
                                <div key={df.id} className="absolute pointer-events-none z-[101] anim-floatUp"
                                     style={df.target === 'player' ? { color: 'red', top: '60%', left: '50%', fontSize: '2rem', fontWeight: 'bold', textShadow: '1px 1px 0 #fff' } 
                                          : df.target === 'monster-crit' ? { color: '#FFD700', top: '35%', left: '45%', fontSize: '2.5rem', fontWeight: 'bold', textShadow: '2px 2px 0 #000' }
                                          : { color: 'red', top: '40%', left: '50%', fontSize: '2rem', fontWeight: 'bold', textShadow: '1px 1px 0 #fff' }}>
                                    {typeof df.amount === 'number' && !df.target.includes('crit') ? `-${df.amount}` : df.amount}
                                </div>
                            ))}

                            {overlay && (
                                <div className="absolute inset-0 bg-black/70 flex items-center justify-center z-[200]">
                                    <div className="bg-white p-6 px-8 rounded-[20px] text-center min-w-[300px] shadow-[0_10px_25px_rgba(0,0,0,0.3)] anim-popIn">
                                        <div className="text-[3.5rem] block my-2 flex justify-center items-center">{overlay.icon.startsWith('<') ? <div dangerouslySetInnerHTML={{__html: overlay.icon}} /> : overlay.icon}</div>
                                        <h2 className="text-2xl m-0 my-1 font-bold text-[#333]">{overlay.title}</h2>
                                        <p className="whitespace-pre-line my-3 text-[#555]">{overlay.desc}</p>
                                        <button className="w-full bg-[#4361EE] text-white font-bold text-lg py-2 rounded-lg shadow-[0_3px_0_#2841ac] mt-2 active:translate-y-1 active:shadow-none" onClick={() => { setOverlay(null); overlay.action && overlay.action(); }}>зўәе®ҡ</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
